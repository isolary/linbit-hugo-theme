<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode "en" }}" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  {{- /* Set theme before paint to avoid a flash of the wrong mode. */ -}}
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        if (t === 'dark') document.documentElement.setAttribute('data-mode', 'dark');
      } catch (e) {}
    })();
  </script>
  {{ partial "head-css.html" . }}
</head>
<body class="min-h-full bg-app text-fg-body antialiased">
  <div class="flex min-h-screen flex-col">
    {{ partial "header.html" (dict "ctx" . "singlepage" false) }}
    <div class="mx-auto flex w-full max-w-screen-xl flex-1 gap-8 px-4 sm:px-6">
      {{ partial "sidebar.html" . }}
      <main class="min-w-0 flex-1 py-10">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "toc.html" . }}
    </div>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
